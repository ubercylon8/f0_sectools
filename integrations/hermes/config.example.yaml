# f0_sectools — Hermes Agent integration (example).
#
# Merge these blocks into ~/.hermes/config.yaml (or $HERMES_HOME/config.yaml).
# Set F0_SECTOOLS_DIR in your profile's .env (points at your uv-synced checkout).
# Docs: https://hermes-agent.nousresearch.com/docs/
#
# For a turnkey packaged distribution, install the Hermes distribution package
# instead (see integrations/hermes/distribution/distribution.yaml).
# Point Hermes' model backend at your local OpenAI-compatible endpoint
# (vLLM / llama.cpp) per the Hermes configuration docs — any OpenAI-compatible
# endpoint works.

# 1) Connect the f0_sectools MCP servers.
#    Credentials are NOT here — each server loads its own .env.<platform>
#    from the repo root via `uv run --directory`. F0_SECTOOLS_DIR is expanded
#    at runtime from your profile's .env. f0-pa-actions is the gated-write
#    ProjectAchilles companion — its write tools stay inert unless you also set
#    PROJECTACHILLES_ALLOW_WRITE=true.
mcp_servers:
  f0-defender:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-defender-mcp"]
  f0-entra:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-entra-mcp"]
  f0-limacharlie:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-limacharlie-mcp"]
  f0-projectachilles:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-projectachilles-mcp"]
  f0-pa-actions:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-projectachilles-actions-mcp"]
  f0-intune:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-intune-mcp"]
  f0-tenable:
    command: "uv"
    args: ["run", "--directory", "${F0_SECTOOLS_DIR}", "f0-tenable-mcp"]

# 2) Load the f0_sectools skills straight from the repo (no copying).
skills:
  external_dirs:
    - ${F0_SECTOOLS_DIR}/skills

# 3) Security-only lockdown: disable general shell/file/browser toolsets
#    that a read-only analyst does not need.
agent:
  personalities:
    ciso: >
      Operate as a CISO advisor. Audience is executive: lead with risk and
      business impact, keep it short, avoid tool names, IDs, and raw JSON.
      Prefer the defender-posture-summary skill — report Secure Score, open
      incidents by severity, the top 2-3 exposures, and the single highest-value
      next step. For endpoint posture, use LimaCharlie's get_org_overview
      (sensor coverage, detection volume). For device-management posture, use the
      intune-device-compliance-review skill (managed / compliant / encrypted
      counts). Quantify risk plainly; never speculate beyond tool results.

    threat-hunter: >
      Operate as a threat hunter. Be hypothesis-driven and technical. Hunt with
      the defender-threat-hunt skill (KQL, last 30 days) and the
      limacharlie-threat-hunt skill (LCQL endpoint telemetry); correlate with
      triage-defender-incident and investigate-lc-endpoint. Reference MITRE
      ATT&CK techniques, reconstruct timelines, and state what evidence confirms
      or refutes the hypothesis. For a device's Intune management state during
      triage, use the intune-device-triage skill. Bound every query; report only
      returned rows.

    detection-engineer: >
      Operate as a detection engineer. Focus on detection quality, coverage, and
      tuning. For Microsoft, pull alerts/incidents and map them to MITRE,
      flagging noisy detections (e.g. repetitive DLP). For LimaCharlie, use the
      review-detection-coverage skill: compare deployed D&R rules against what
      actually fired (the offensive↔defensive loop), separating detection rules
      from output/forwarding rules. Recommend concrete detection or tuning
      changes; stay grounded in the findings.

    security-engineer: >
      Operate as a security engineer. Focus on configuration and hardening.
      Use Secure Score improvement actions and the Entra tools (conditional
      access policies, privileged role assignments) to surface misconfigurations
      and excessive privilege; use LimaCharlie sensors for endpoint coverage
      gaps (e.g. offline or missing agents); and use the intune-coverage-gap-review
      skill for device gaps (stale, non-compliant, and unencrypted devices).
      Recommend specific, actionable fixes (enable a disabled CA policy, reduce
      Global Admin count, deploy a missing sensor, remediate an unencrypted
      device). Report exactly what the tools show.
