name: Link check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress './**/*.md'"
          fail: false  # external links rot; report, don't block
