# Small-model tool-calling eval task set — ProjectAchilles server.
# See evals/defender/tasks.yaml for the field schema. evals/test_eval_coverage.py
# enforces that every ProjectAchilles tool has at least one task.

- prompt: "What's our ProjectAchilles defense score?"
  expect_tool: get_defense_score

- prompt: "How well are our controls blocking simulated attacks?"
  expect_tool: get_defense_score

- prompt: "Is our defense score improving over time?"
  expect_tool: get_defense_score
  expect_args: { over_time: true }

- prompt: "Which MITRE techniques are we weakest against?"
  expect_tool: get_weak_techniques

- prompt: "Show me recent test executions that were not blocked."
  expect_tool: list_test_executions

- prompt: "What risks have we formally accepted?"
  expect_tool: list_risk_acceptances

- prompt: "List our ProjectAchilles test agents."
  expect_tool: list_agents

- prompt: "How healthy is our test-agent fleet?"
  expect_tool: get_fleet_health

- prompt: "How many ProjectAchilles tests do we have for technique T1110?"
  expect_tool: find_tests
  expect_args: { by: technique, value: T1110 }

- prompt: "Do we have any tests for threat actor APT29?"
  expect_tool: find_tests
  expect_args: { by: actor, value: APT29 }

- prompt: "List our cyber-hygiene control checks in the catalog."
  expect_tool: find_tests
  expect_args: { by: category, value: cyber-hygiene }

- prompt: "What does the Kerberoast test cover?"
  expect_tool: get_test

- prompt: "show the results for the Kerberoast test on the windows fleet"
  expect_tool: list_test_executions
  origin: projectachilles
